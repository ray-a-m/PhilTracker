# Ground-truth listings that MUST be caught by the scraper layer.
#
# Each entry: an opportunity that really exists right now (or recently) and
# which a working PhilTracker should not silently drop. If one of these ever
# fails to show up in a --live run, investigate before merging anything.
#
# Schema:
#   - url:                  the canonical listing URL (required)
#     expected_institution: substring expected in the canonical institution
#     expected_is_posting:  true for all of these (they're real postings)
#     source:               which scraper is responsible
#     note:                 free-text for humans
#
# Grow this file as you encounter real listings in the wild. Target: ≥10
# before the first live run. Diversity > volume — one entry per scraper
# at minimum.

entries:
  - url: "https://royalsociety.org/grants-schemes-awards/grants/newton-international/"
    expected_institution: "Royal Society"
    expected_is_posting: true
    source: "institutional"           # via institutional/config.yaml — TODO verify added
    note: "Newton International Fellowship — our canary. If the scraper drops this, something is very wrong."

