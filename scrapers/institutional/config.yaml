# Institutional site configurations for PhilTracker
# Each entry defines a site to scrape with its type and settings.
# type: "wordpress" (blog-style) or "static" (university/institutional page)
# keywords: terms that indicate a post/link is job-related
# secondary_url: optional additional page to check

default_keywords: &default_keywords
  - "postdoc"
  - "post-doc"
  - "postdoctoral"
  - "fellowship"
  - "position"
  - "call for applications"
  - "call for papers"
  - "PhD"
  - "doctoral"
  - "tenure"
  - "professor"
  - "lecturer"
  - "vacancy"
  - "job"
  - "hiring"
  - "opening"
  - "appointment"
  - "opportunity"

