<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhilTracker</title>
<style>
  :root {
    --bg: #fafafa; --surface: #fff; --text: #1a1a1a; --muted: #666;
    --border: #ddd; --accent: #2563eb; --red: #dc2626; --yellow: #ca8a04;
    --green: #16a34a; --grey: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); font-size: 0.85rem; }
  .header-left p { margin-top: 0.2rem; }
  .profile-toggle { background: var(--accent); color: #fff; border: none; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
  .profile-toggle:hover { background: #1d4ed8; }
  .profile-toggle.active { background: #16a34a; }
  .controls { padding: 1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
  .controls input, .controls select { padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.85rem; }
  .controls input[type=text] { flex: 1; min-width: 200px; }
  .controls select { min-width: 140px; }
  .stats { padding: 0.5rem 2rem; font-size: 0.8rem; color: var(--muted); }

  /* Profile panel */
  .profile-panel { display: none; background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; }
  .profile-panel.open { display: block; }
  .profile-panel h3 { font-size: 1rem; margin-bottom: 0.75rem; }
  .profile-section { margin-bottom: 1rem; }
  .profile-section label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 0.3rem; }
  .tag-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tag-toggle { padding: 0.2rem 0.6rem; border: 1px solid var(--border); border-radius: 9999px; font-size: 0.75rem; cursor: pointer; background: var(--surface); transition: all 0.15s; user-select: none; }
  .tag-toggle:hover { border-color: var(--accent); }
  .tag-toggle.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .type-toggle { padding: 0.2rem 0.6rem; border: 1px solid var(--border); border-radius: 9999px; font-size: 0.75rem; cursor: pointer; background: var(--surface); transition: all 0.15s; user-select: none; }
  .type-toggle:hover { border-color: var(--accent); }
  .type-toggle.on { background: #7c3aed; color: #fff; border-color: #7c3aed; }
  .profile-section input[type=text] { padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.85rem; width: 300px; }
  .profile-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  .profile-actions button { padding: 0.3rem 0.8rem; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  .btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-clear { background: var(--surface); }
  .profile-status { font-size: 0.8rem; color: var(--green); margin-left: 0.5rem; }

  main { padding: 0 2rem 2rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
  th { text-align: left; padding: 0.6rem 0.5rem; border-bottom: 2px solid var(--border); font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--accent); }
  th.sorted { color: var(--accent); }
  td { padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: top; }
  tr.listing-row { cursor: pointer; }
  tr.listing-row:hover { background: #f0f5ff; }
  .type-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
  .type-postdoc { background: #dbeafe; color: #1e40af; }
  .type-job { background: #dcfce7; color: #166534; }
  .type-fellowship { background: #fef3c7; color: #92400e; }
  .type-phd { background: #f3e8ff; color: #6b21a8; }
  .type-unknown { background: #f3f4f6; color: #4b5563; }
  .relevance-badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; font-weight: 700; min-width: 28px; text-align: center; }
  .rel-high { background: #dcfce7; color: #166534; }
  .rel-med { background: #fef3c7; color: #92400e; }
  .rel-low { background: #f3f4f6; color: #4b5563; }
  .deadline { white-space: nowrap; font-weight: 500; }
  .deadline-red { color: var(--red); }
  .deadline-yellow { color: var(--yellow); }
  .deadline-green { color: var(--green); }
  .deadline-grey { color: var(--grey); }
  .tags { display: flex; flex-wrap: wrap; gap: 0.25rem; }
  .tag { background: #e0e7ff; color: #3730a3; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; }
  .tag.matched { background: #dcfce7; color: #166534; font-weight: 600; }
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-cell { padding: 1rem; background: #f8fafc; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
  .detail-field label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; }
  .detail-field span { font-size: 0.9rem; }
  .detail-desc { margin-top: 0.75rem; white-space: pre-wrap; font-size: 0.85rem; line-height: 1.6; max-height: 300px; overflow-y: auto; color: #333; }
  .detail-link { margin-top: 0.75rem; }
  .detail-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .detail-link a:hover { text-decoration: underline; }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  @media (max-width: 768px) {
    .controls { flex-direction: column; }
    header, .controls, .stats, main, .profile-panel { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1><span>Phil</span>Tracker</h1>
    <p>Philosophy job &amp; fellowship aggregator</p>
  </div>
  <button class="profile-toggle" id="profileBtn" onclick="toggleProfile()">My Profile</button>
</header>

<div class="profile-panel" id="profilePanel">
  <h3>Research Interests</h3>
  <div class="profile-section">
    <label>Subfield Tags (click to toggle)</label>
    <div class="tag-grid" id="interestTags"></div>
  </div>
  <div class="profile-section">
    <label>Preferred Position Types</label>
    <div class="tag-grid" id="typeTags"></div>
  </div>
  <div class="profile-section">
    <label>Preferred Locations (comma-separated)</label>
    <input type="text" id="profileLocations" placeholder="e.g. UK, Germany, USA, Switzerland">
  </div>
  <div class="profile-actions">
    <button class="btn-save" onclick="saveProfile()">Save Profile</button>
    <button class="btn-clear" onclick="clearProfile()">Clear</button>
    <span class="profile-status" id="profileStatus"></span>
  </div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search titles, institutions, descriptions...">
  <select id="filterType">
    <option value="">All types</option>
    <option value="postdoc">Postdoc</option>
    <option value="job">Tenure-track / Faculty</option>
    <option value="fellowship">Fellowship</option>
    <option value="phd">PhD</option>
    <option value="unknown">Other</option>
  </select>
  <select id="filterTag"><option value="">All subfields</option></select>
  <input type="text" id="filterLocation" placeholder="Filter by location...">
</div>

<div class="stats" id="stats"></div>

<main>
<table>
  <thead>
    <tr>
      <th data-sort="relevance" id="thRelevance" style="display:none">Score</th>
      <th data-sort="title">Title</th>
      <th data-sort="institution">Institution</th>
      <th data-sort="listing_type">Type</th>
      <th data-sort="deadline">Deadline</th>
      <th>Tags</th>
      <th data-sort="date_first_seen">Added</th>
    </tr>
  </thead>
  <tbody id="listings"></tbody>
</table>
<div class="empty" id="empty" style="display:none;">No listings match your filters.</div>
</main>

<script>
let allListings = [];
let allTags = [];
let currentSort = 'deadline';
let currentOrder = 'asc';
let profile = { interests: [], preferred_types: [], preferred_locations: [] };
const TYPES = ['postdoc', 'job', 'fellowship', 'phd'];

// Tag categories for grouping in the profile panel
const TAG_CATEGORIES = {
  'Science & Physics': ['philosophy-of-science', 'philosophy-of-physics', 'history-and-philosophy-of-science', 'philosophy-of-biology', 'philosophy-of-chemistry', 'philosophy-of-mathematics', 'philosophy-of-computing'],
  'Epistemology & Logic': ['formal-epistemology', 'social-epistemology', 'epistemology', 'logic', 'metaphysics-of-science'],
  'Mind, Language & Metaphysics': ['philosophy-of-mind', 'philosophy-of-language', 'metaphysics'],
  'Ethics & Political': ['political-philosophy-ethics', 'ethics-of-science', 'philosophy-of-social-science', 'aesthetics', 'philosophy-of-religion'],
  'Historical & Continental': ['german-idealism', 'historical-philosophy', 'continental-philosophy'],
};

async function init() {
  const [listings, tags] = await Promise.all([
    fetch('/api/listings').then(r => r.json()),
    fetch('/api/tags').then(r => r.json()),
  ]);
  allListings = listings;
  allTags = tags;

  const tagSelect = document.getElementById('filterTag');
  tags.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t.replace(/-/g, ' ');
    tagSelect.appendChild(opt);
  });

  buildProfilePanel(tags);
  loadProfile();
  render();

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('filterType').addEventListener('change', render);
  document.getElementById('filterTag').addEventListener('change', render);
  document.getElementById('filterLocation').addEventListener('input', render);
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const field = th.dataset.sort;
      if (currentSort === field) currentOrder = currentOrder === 'asc' ? 'desc' : 'asc';
      else { currentSort = field; currentOrder = field === 'relevance' ? 'desc' : 'asc'; }
      render();
    });
  });
}

function buildProfilePanel(tags) {
  const container = document.getElementById('interestTags');
  for (const [category, catTags] of Object.entries(TAG_CATEGORIES)) {
    const label = document.createElement('div');
    label.style.cssText = 'width:100%;font-size:0.7rem;color:var(--muted);margin-top:0.4rem;font-weight:600;';
    label.textContent = category;
    container.appendChild(label);
    for (const t of catTags) {
      if (!tags.includes(t)) continue;
      const btn = document.createElement('span');
      btn.className = 'tag-toggle';
      btn.dataset.tag = t;
      btn.textContent = t.replace(/-/g, ' ');
      btn.onclick = () => { btn.classList.toggle('on'); };
      container.appendChild(btn);
    }
  }

  const typeContainer = document.getElementById('typeTags');
  TYPES.forEach(t => {
    const btn = document.createElement('span');
    btn.className = 'type-toggle';
    btn.dataset.type = t;
    btn.textContent = t;
    btn.onclick = () => { btn.classList.toggle('on'); };
    typeContainer.appendChild(btn);
  });
}

function toggleProfile() {
  const panel = document.getElementById('profilePanel');
  panel.classList.toggle('open');
  document.getElementById('profileBtn').classList.toggle('active', panel.classList.contains('open'));
}

function saveProfile() {
  profile.interests = [...document.querySelectorAll('#interestTags .tag-toggle.on')].map(b => b.dataset.tag);
  profile.preferred_types = [...document.querySelectorAll('#typeTags .type-toggle.on')].map(b => b.dataset.type);
  profile.preferred_locations = document.getElementById('profileLocations').value.split(',').map(s => s.trim()).filter(Boolean);
  localStorage.setItem('philtracker_profile', JSON.stringify(profile));

  const hasProfile = profile.interests.length > 0;
  document.getElementById('thRelevance').style.display = hasProfile ? '' : 'none';
  if (hasProfile) { currentSort = 'relevance'; currentOrder = 'desc'; }
  document.getElementById('profileStatus').textContent = 'Saved!';
  setTimeout(() => document.getElementById('profileStatus').textContent = '', 2000);
  document.getElementById('profileBtn').classList.toggle('active', hasProfile);

  // Score all listings client-side
  scoreAllListings();
  render();
}

function clearProfile() {
  profile = { interests: [], preferred_types: [], preferred_locations: [] };
  localStorage.removeItem('philtracker_profile');
  document.querySelectorAll('.tag-toggle.on, .type-toggle.on').forEach(b => b.classList.remove('on'));
  document.getElementById('profileLocations').value = '';
  document.getElementById('thRelevance').style.display = 'none';
  currentSort = 'deadline'; currentOrder = 'asc';
  allListings.forEach(l => delete l.relevance);
  render();
}

function loadProfile() {
  const saved = localStorage.getItem('philtracker_profile');
  if (!saved) return;
  profile = JSON.parse(saved);
  profile.interests.forEach(t => {
    const btn = document.querySelector(`#interestTags .tag-toggle[data-tag="${t}"]`);
    if (btn) btn.classList.add('on');
  });
  profile.preferred_types.forEach(t => {
    const btn = document.querySelector(`#typeTags .type-toggle[data-type="${t}"]`);
    if (btn) btn.classList.add('on');
  });
  document.getElementById('profileLocations').value = (profile.preferred_locations || []).join(', ');

  if (profile.interests.length > 0) {
    document.getElementById('thRelevance').style.display = '';
    currentSort = 'relevance'; currentOrder = 'desc';
    document.getElementById('profileBtn').classList.add('active');
    scoreAllListings();
  }
}

function scoreAllListings() {
  // Client-side relevance scoring (mirrors backend logic)
  const tagKeywords = {}; // We'll approximate with tag names as keywords
  allListings.forEach(l => {
    const listingTags = new Set(JSON.parse(l.aos || '[]'));
    const interests = new Set(profile.interests);
    if (interests.size === 0) { l.relevance = 0; return; }

    // Tag overlap: 0-70
    const matches = [...interests].filter(t => listingTags.has(t)).length;
    const tagScore = Math.min(70, Math.round((matches / interests.size) * 70));

    // Keyword bonus: 0-30 (check if interest tag name words appear in title/desc)
    const text = ((l.title || '') + ' ' + (l.description || '') + ' ' + (l.aos_raw || '')).toLowerCase();
    let kwHits = 0, kwTotal = 0;
    interests.forEach(tag => {
      const words = tag.split('-').filter(w => w.length > 2);
      kwTotal += words.length;
      words.forEach(w => { if (text.includes(w)) kwHits++; });
    });
    const kwScore = kwTotal > 0 ? Math.min(30, Math.round((kwHits / kwTotal) * 100)) : 0;

    l.relevance = Math.min(100, tagScore + kwScore);
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const type = document.getElementById('filterType').value;
  const tag = document.getElementById('filterTag').value;
  const loc = document.getElementById('filterLocation').value.toLowerCase();
  const hasProfile = profile.interests.length > 0;

  let filtered = allListings.filter(l => {
    if (q && !(l.title||'').toLowerCase().includes(q) && !(l.institution||'').toLowerCase().includes(q) && !(l.description||'').toLowerCase().includes(q)) return false;
    if (type && l.listing_type !== type) return false;
    if (tag) { const tags = JSON.parse(l.aos || '[]'); if (!tags.includes(tag)) return false; }
    if (loc && !(l.location||'').toLowerCase().includes(loc)) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va, vb;
    if (currentSort === 'relevance') {
      va = a.relevance || 0; vb = b.relevance || 0;
      if (va !== vb) return currentOrder === 'desc' ? vb - va : va - vb;
      // Tiebreak by deadline
      const da = a.deadline || '9999-12-31', db = b.deadline || '9999-12-31';
      return da < db ? -1 : da > db ? 1 : 0;
    }
    va = (a[currentSort] || ''); vb = (b[currentSort] || '');
    if (currentSort === 'deadline') { va = va || '9999-12-31'; vb = vb || '9999-12-31'; }
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return currentOrder === 'asc' ? cmp : -cmp;
  });

  document.querySelectorAll('th[data-sort]').forEach(th => {
    if (th.id === 'thRelevance' && !hasProfile) return;
    th.classList.toggle('sorted', th.dataset.sort === currentSort);
    th.textContent = th.textContent.replace(/ [▲▼]$/, '');
    if (th.dataset.sort === currentSort) th.textContent += currentOrder === 'asc' ? ' ▲' : ' ▼';
  });

  const tbody = document.getElementById('listings');
  tbody.innerHTML = '';
  document.getElementById('stats').textContent = `Showing ${filtered.length} of ${allListings.length} listings`;
  document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';

  const interestSet = new Set(profile.interests);

  filtered.forEach((l, i) => {
    const tr = document.createElement('tr');
    tr.className = 'listing-row';
    const tags = JSON.parse(l.aos || '[]');
    const dl = deadlineInfo(l.deadline);

    let relCell = '';
    if (hasProfile) {
      const score = l.relevance || 0;
      const cls = score >= 50 ? 'rel-high' : score >= 20 ? 'rel-med' : 'rel-low';
      relCell = `<td><span class="relevance-badge ${cls}">${score}</span></td>`;
    }

    const tagHtml = tags.map(t => {
      const matched = interestSet.has(t) ? ' matched' : '';
      return `<span class="tag${matched}">${t.replace(/-/g,' ')}</span>`;
    }).join('');

    tr.innerHTML = `
      ${relCell}
      <td><strong>${esc(l.title)}</strong><br><small style="color:var(--muted)">${esc(l.source)}</small></td>
      <td>${esc(l.institution)}</td>
      <td><span class="type-badge type-${l.listing_type}">${l.listing_type}</span></td>
      <td class="deadline ${dl.cls}">${dl.text}</td>
      <td><div class="tags">${tagHtml}</div></td>
      <td style="white-space:nowrap;font-size:0.8rem;color:var(--muted)">${l.date_first_seen || ''}</td>
    `;
    tr.addEventListener('click', () => {
      const detail = document.getElementById('detail-' + i);
      if (detail) detail.classList.toggle('open');
    });
    tbody.appendChild(tr);

    const detailTr = document.createElement('tr');
    detailTr.className = 'detail-row';
    detailTr.id = 'detail-' + i;
    const secondaryUrls = JSON.parse(l.secondary_urls || '[]');
    const cols = hasProfile ? 7 : 6;
    detailTr.innerHTML = `<td colspan="${cols}" class="detail-cell">
      <div class="detail-grid">
        ${field('Location', l.location)}
        ${field('Duration', l.duration)}
        ${field('Start Date', l.start_date)}
        ${field('Salary', l.salary)}
        ${field('AOS', l.aos_raw)}
        ${field('Type', l.listing_type)}
      </div>
      ${l.description ? `<div class="detail-desc">${esc(l.description)}</div>` : ''}
      <div class="detail-link">
        <a href="${esc(l.url)}" target="_blank" rel="noopener">View original posting &rarr;</a>
        ${secondaryUrls.map(u => `<br><a href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a>`).join('')}
      </div>
    </td>`;
    tbody.appendChild(detailTr);
  });
}

function field(label, value) {
  if (!value) return '';
  return `<div class="detail-field"><label>${label}</label><span>${esc(value)}</span></div>`;
}

function deadlineInfo(deadline) {
  if (!deadline) return { text: 'No deadline', cls: 'deadline-grey' };
  const d = new Date(deadline + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.ceil((d - now) / 86400000);
  if (diff < 0) return { text: `${deadline} (passed)`, cls: 'deadline-grey' };
  if (diff <= 7) return { text: `${deadline} (${diff}d left)`, cls: 'deadline-red' };
  if (diff <= 21) return { text: `${deadline} (${diff}d left)`, cls: 'deadline-yellow' };
  return { text: `${deadline} (${diff}d left)`, cls: 'deadline-green' };
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

init();
</script>
</body>
</html>
